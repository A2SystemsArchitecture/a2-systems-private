<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 – Interactive Bracket</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #C9A84C; --gold-light: #F0D080;
    --dark: #07080F; --surface: #141620; --surface2: #1A1D2E;
    --border: #252840; --muted: #6670A0; --text: #DDE0F0;
    --win-bg: #0D2B1A; --win-text: #7EE8A2; --win-check: #2ECC71;
    --r32: #1a3560; --r16: #25206a; --qf: #4a1f6e; --sf: #6e3a1f;
  }
  body { background:var(--dark); color:var(--text); font-family:'Inter',Arial,sans-serif; min-height:100vh; overflow-x:auto; }

  header { text-align:center; padding:24px 20px 14px; background:linear-gradient(180deg,#0b0c18 0%,transparent 100%); }
  header::after { content:''; display:block; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); margin-top:14px; opacity:.5; }
  .eyebrow { font-size:10px; font-weight:700; letter-spacing:5px; text-transform:uppercase; color:var(--gold); margin-bottom:5px; }
  h1 { font-size:clamp(24px,5vw,46px); letter-spacing:4px; color:#fff; line-height:1; font-weight:900; text-transform:uppercase; }
  h1 span { color:var(--gold); }
  .subtitle { font-size:11px; color:var(--muted); margin-top:5px; }

  .controls { display:flex; align-items:center; justify-content:center; padding:10px 20px 0; }
  .progress { font-size:11px; color:var(--muted); }
  .progress b { color:var(--gold); }

  .bracket-wrap { padding:10px 8px 48px; overflow-x:auto; }
  .bracket { display:flex; align-items:stretch; gap:0; min-width:1600px; }

  .col { display:flex; flex-direction:column; flex:1; padding:0 2px; min-width:0; }
  .col-label { font-size:11px; font-weight:800; letter-spacing:2.5px; color:var(--gold); text-align:center; padding:5px 4px 8px; border-bottom:1px solid var(--border); margin-bottom:4px; text-transform:uppercase; }
  .col-body { display:flex; flex-direction:column; flex:1; gap:2px; justify-content:space-around; }
  .match-slot { flex:0 0 auto; display:flex; align-items:center; }
  .match { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:5px; overflow:hidden; transition:border-color .2s; }

  .match { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:5px; overflow:hidden; transition:border-color .2s; }
  .match:hover { border-color:rgba(201,168,76,.4); }
  .col[data-r="r32"] .match { border-left:2px solid var(--r32); }
  .col[data-r="r16"] .match { border-left:2px solid var(--r16); }
  .col[data-r="qf"]  .match { border-left:2px solid var(--qf); }
  .col[data-r="sf"]  .match { border-left:2px solid var(--sf); }
  .col[data-r="sf"] { flex:1; }
  .col[data-r="f"]   .match { border-left:2px solid var(--gold); box-shadow:0 0 14px rgba(201,168,76,.15); }

  .game-info { background:#0d0e18; border-bottom:1px solid var(--border); padding:3px 7px; }
  .gi-top { display:flex; gap:4px; align-items:center; }
  .gi-date { font-size:8px; color:var(--gold); font-weight:700; letter-spacing:.5px; white-space:nowrap; }
  .gi-time { font-size:8px; color:#fff; font-weight:700; white-space:nowrap; }
  .gi-venue { font-size:8px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  .team { display:flex; align-items:center; gap:6px; padding:4px 7px; min-height:30px; font-size:10px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; cursor:pointer; position:relative; user-select:none; transition:background .12s; }
  .team + .team { border-top:1px solid var(--border); }
  .team:hover:not(.tbd) { background:rgba(201,168,76,.1); }
  .team.tbd { color:var(--muted); font-style:italic; cursor:default; }
  .team.winner { background:var(--win-bg); color:var(--win-text); }
  .flag-circle { width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; background:#1e2035; border:1.5px solid var(--border); overflow:hidden; }
  .flag-circle img { width:100%; height:100%; object-fit:cover; display:block; }
  .team.winner .flag-circle { border-color:var(--win-check); }
  .team .tname { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .team .check { display:none; font-size:9px; color:var(--win-check); }
  .team.winner .check { display:inline; }

  .toggle { width:100%; background:none; border:none; border-top:1px solid var(--border); height:15px; cursor:pointer; font-size:10px; letter-spacing:3px; color:var(--muted); display:flex; align-items:center; justify-content:center; transition:color .15s; }
  .match.open .toggle { color:var(--gold); }
  .score-panel { display:none; background:#0a0b14; border-top:1px solid var(--border); padding:5px 6px; align-items:center; justify-content:center; gap:5px; }
  .match.open .score-panel { display:flex; }
  .sc-wrap { display:flex; flex-direction:column; align-items:center; gap:2px; }
  .sc-label { font-size:8px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
  .sc-input { width:30px; background:var(--surface2); border:1px solid var(--border); border-radius:3px; color:var(--text); text-align:center; font-size:13px; font-weight:700; padding:2px; outline:none; }
  .sc-input:focus { border-color:var(--gold); }
  .sc-vs { font-size:9px; color:var(--muted); font-weight:700; }
  .sc-btn { background:var(--gold); color:#000; border:none; border-radius:3px; padding:3px 8px; font-size:9px; font-weight:800; cursor:pointer; letter-spacing:1px; text-transform:uppercase; }
  .sc-btn:hover { background:var(--gold-light); }

  .center-col { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0 6px; min-width:112px; }
  .champion-box { background:#000; border:1px solid var(--gold); border-radius:8px; padding:0; text-align:center; width:100%; display:flex; flex-direction:column; align-items:center; gap:0; box-shadow:0 0 28px rgba(201,168,76,.22); margin-top:10px; overflow:hidden; }
  .champ-trophy { font-size:26px; }
  .champ-flag { font-size:24px; }
  .champ-label { font-size:11px; font-weight:800; letter-spacing:3px; color:var(--gold); text-transform:uppercase; padding:6px 4px 2px; }
  .champ-name { font-size:17px; font-weight:900; color:#fff; letter-spacing:2px; text-transform:uppercase; padding:0 4px 8px; }
  .champ-tbd { font-size:11px; color:var(--muted); letter-spacing:1px; padding:0 4px 8px; }

  .controls { display:flex; align-items:center; justify-content:center; gap:12px; padding:10px 20px 0; flex-wrap:wrap; }
  .save-btn { background:var(--gold); color:#000; border:none; padding:7px 18px; border-radius:20px; font-size:11px; font-weight:800; cursor:pointer; letter-spacing:1px; text-transform:uppercase; transition:background .2s; }
  .save-btn:hover { background:var(--gold-light); }
  .link-box { display:none; position:fixed; bottom:0; left:0; right:0; background:#0f1018; border-top:2px solid var(--gold); padding:14px 16px; z-index:999; }
  .link-box.show { display:block; }
  .link-box-label { font-size:11px; color:var(--gold); font-weight:700; letter-spacing:1px; text-transform:uppercase; margin-bottom:8px; }
  .link-box-row { display:flex; gap:8px; align-items:center; }
  .link-input { flex:1; background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:11px; padding:8px 10px; outline:none; }
  .link-copy-btn { background:var(--gold); color:#000; border:none; border-radius:6px; padding:8px 14px; font-size:11px; font-weight:800; cursor:pointer; white-space:nowrap; }
  .link-copy-btn:hover { background:var(--gold-light); }
  .link-close-btn { background:transparent; border:1px solid var(--border); color:var(--muted); border-radius:6px; padding:8px 12px; font-size:11px; cursor:pointer; }
  .link-close-btn:hover { border-color:var(--gold); color:var(--gold); }
  .link-hint { font-size:10px; color:var(--muted); margin-top:7px; }
</style>
</head>
<body>
<header>
  <div class="eyebrow">USA · Canada · Mexico</div>
  <h1>FIFA World Cup <span>2026</span></h1>
  <p class="subtitle">Tap a team to advance &nbsp;·&nbsp; Tap a winner again to undo &nbsp;·&nbsp; Tap ··· to enter score</p>
</header>

<div class="controls">
  <span class="progress">Matches decided: <b id="prog">0 / 31</b></span>
  <button class="save-btn" onclick="saveBracket()">💾 Save &amp; Share</button>
</div>
<div id="link-box" class="link-box">
  <div class="link-box-label">📋 Your bracket link — copy &amp; save it</div>
  <div class="link-box-row">
    <input class="link-input" id="link-input" type="text" readonly onclick="this.select()">
    <button class="link-copy-btn" onclick="copyLink()">Copy</button>
    <button class="link-close-btn" onclick="closeLinkBox()">✕</button>
  </div>
  <div class="link-hint">Open this link on any device to restore your bracket. Bookmark it or save it to your Notes app.</div>
</div>

<div class="bracket-wrap">
  <div class="bracket" id="bracket"></div>
</div>
<div id="below-bracket"></div>

<script>
// c = ISO 3166-1 alpha-2 for flagcdn.com
const L32 = [
  {t1:{n:"Germany",c:"de"},       t2:{n:"Paraguay",     c:"py"}, date:"Mon Jun 29", time:"4:30 PM ET",  venue:"Gillette Stadium · Foxborough, MA"},
  {t1:{n:"France",c:"fr"},        t2:{n:"Sweden",       c:"se"}, date:"Tue Jun 30", time:"5:00 PM ET",  venue:"MetLife Stadium · East Rutherford, NJ"},
  {t1:{n:"South Africa",c:"za"},  t2:{n:"Canada",       c:"ca"}, date:"Sun Jun 28", time:"6:00 PM ET",  venue:"SoFi Stadium · Inglewood, CA"},
  {t1:{n:"Netherlands",c:"nl"},   t2:{n:"Morocco",      c:"ma"}, date:"Mon Jun 29", time:"10:00 PM ET", venue:"Estadio BBVA · Monterrey, Mexico"},
  {t1:{n:"Portugal",c:"pt"},      t2:{n:"Croatia",      c:"hr"}, date:"Thu Jul 2",  time:"7:00 PM ET",  venue:"BMO Field · Toronto, Canada"},
  {t1:{n:"Spain",c:"es"},         t2:{n:"Austria",      c:"at"}, date:"Thu Jul 2",  time:"6:00 PM ET",  venue:"SoFi Stadium · Inglewood, CA"},
  {t1:{n:"United States",c:"us"}, t2:{n:"Bosnia & Herz.",c:"ba"},date:"Wed Jul 1",  time:"11:00 PM ET", venue:"Levi's Stadium · Santa Clara, CA"},
  {t1:{n:"Belgium",c:"be"},       t2:{n:"Senegal",      c:"sn"}, date:"Wed Jul 1",  time:"7:00 PM ET",  venue:"Lumen Field · Seattle, WA"},
];
const R32 = [
  {t1:{n:"Brazil",c:"br"},        t2:{n:"Japan",      c:"jp"}, date:"Mon Jun 29", time:"2:00 PM ET",   venue:"NRG Stadium · Houston, TX"},
  {t1:{n:"Ivory Coast",c:"ci"},   t2:{n:"Norway",     c:"no"}, date:"Tue Jun 30", time:"2:00 PM ET",   venue:"AT&T Stadium · Arlington, TX"},
  {t1:{n:"Mexico",c:"mx"},        t2:{n:"Ecuador",    c:"ec"}, date:"Tue Jun 30", time:"10:00 PM ET",  venue:"Estadio Azteca · Mexico City, MX"},
  {t1:{n:"England",c:"gb-eng"},   t2:{n:"DR Congo",   c:"cd"}, date:"Wed Jul 1",  time:"12:00 PM ET",  venue:"Mercedes-Benz Stadium · Atlanta, GA"},
  {t1:{n:"Argentina",c:"ar"},     t2:{n:"Cape Verde", c:"cv"}, date:"Fri Jul 3",  time:"6:00 PM ET",   venue:"Hard Rock Stadium · Miami Gardens, FL"},
  {t1:{n:"Australia",c:"au"},     t2:{n:"Egypt",      c:"eg"}, date:"Fri Jul 3",  time:"3:00 PM ET",   venue:"AT&T Stadium · Arlington, TX"},
  {t1:{n:"Switzerland",c:"ch"},   t2:{n:"Algeria",    c:"dz"}, date:"Thu Jul 2",  time:"2:00 AM ET",   venue:"BC Place · Vancouver, Canada"},
  {t1:{n:"Colombia",c:"co"},      t2:{n:"Ghana",      c:"gh"}, date:"Fri Jul 3",  time:"10:30 PM ET",  venue:"Arrowhead Stadium · Kansas City, MO"},
];


function mk(arr){return arr.map(m=>({t1:m.t1,t2:m.t2,winner:null,s1:"",s2:"",date:m.date||"",time:m.time||"",venue:m.venue||""}))}

// Schedule — source: ESPN bracket (verified from image). All times ET.
const SCHED = {
  // ROUND OF 16
  lr16_0:{date:"Sat Jul 4",  time:"5:00 PM ET",   venue:"Lincoln Financial Field · Philadelphia, PA"},  // M89 Paraguay/France
  lr16_1:{date:"Sat Jul 4",  time:"1:00 PM ET",   venue:"NRG Stadium · Houston, TX"},                  // M90 Canada/Morocco
  lr16_2:{date:"Mon Jul 6",  time:"3:00 PM ET",   venue:"AT&T Stadium · Arlington, TX"},               // M93 W11/W12
  lr16_3:{date:"Mon Jul 6",  time:"8:00 PM ET",   venue:"Lumen Field · Seattle, WA"},                  // M94 W9/Belgium
  rr16_0:{date:"Sun Jul 5",  time:"4:00 PM ET",   venue:"MetLife Stadium · East Rutherford, NJ"},      // M91 Brazil/Norway
  rr16_1:{date:"Sun Jul 5",  time:"8:00 PM ET",   venue:"Estadio Azteca · Mexico City, MX"},           // M92 Mexico/England
  rr16_2:{date:"Tue Jul 7",  time:"12:00 PM ET",  venue:"Mercedes-Benz Stadium · Atlanta, GA"},        // M95 W14/W16
  rr16_3:{date:"Tue Jul 7",  time:"4:00 PM ET",   venue:"BC Place · Vancouver, Canada"},               // M96 W13/W15
  // QUARTERFINALS
  rqf_0:{date:"Thu Jul 9",   time:"4:00 PM ET",   venue:"Gillette Stadium · Foxborough, MA"},          // M97
  lqf_0:{date:"Fri Jul 10",  time:"3:00 PM ET",   venue:"SoFi Stadium · Inglewood, CA"},              // M98
  rqf_1:{date:"Sat Jul 11",  time:"5:00 PM ET",   venue:"Hard Rock Stadium · Miami Gardens, FL"},      // M99
  lqf_1:{date:"Sat Jul 11",  time:"9:00 PM ET",   venue:"Arrowhead Stadium · Kansas City, MO"},        // M100
  // SEMIFINALS
  lsf_0:{date:"Tue Jul 14",  time:"3:00 PM ET",   venue:"AT&T Stadium · Arlington, TX"},               // M101
  rsf_0:{date:"Wed Jul 15",  time:"3:00 PM ET",   venue:"Mercedes-Benz Stadium · Atlanta, GA"},        // M102
  // 3RD PLACE
  tpl_0:{date:"Sat Jul 18",  time:"5:00 PM ET",   venue:"Hard Rock Stadium · Miami Gardens, FL"},      // M103
  // FINAL
  fin_0:{date:"Sun Jul 19",  time:"3:00 PM ET",   venue:"MetLife Stadium · East Rutherford, NJ"},      // M104
};

function empty(n,poolKey){
  return Array(n).fill(null).map((_,i)=>{
    const s=SCHED[poolKey+"_"+i]||{};
    return{t1:null,t2:null,winner:null,s1:"",s2:"",date:s.date||"",time:s.time||"",venue:s.venue||""};
  });
}
function flagUrl(c){return`https://flagcdn.com/40x30/${c}.png`;}

let S = {lr32:mk(L32),rr32:mk(R32),lr16:empty(4,"lr16"),rr16:empty(4,"rr16"),lqf:empty(2,"lqf"),rqf:empty(2,"rqf"),lsf:empty(1,"lsf"),rsf:empty(1,"rsf"),tpl:empty(1,"tpl"),fin:empty(1,"fin"),open:null};



const FEED={
  // lr32 → lr16 (verified from audited match numbers)
  "lr32_0":{p:"lr16",i:0,s:1},"lr32_1":{p:"lr16",i:0,s:2},  // M74+M77 → M89 Philadelphia
  "lr32_2":{p:"lr16",i:1,s:1},"lr32_3":{p:"lr16",i:1,s:2},  // M73+M75 → M90 Houston
  "lr32_4":{p:"lr16",i:2,s:1},"lr32_5":{p:"lr16",i:2,s:2},  // M83+M84 → M93 Dallas
  "lr32_6":{p:"lr16",i:3,s:1},"lr32_7":{p:"lr16",i:3,s:2},  // M81+M82 → M94 Seattle
  // rr32 → rr16 (verified from audited match numbers)
  "rr32_0":{p:"rr16",i:0,s:1},"rr32_1":{p:"rr16",i:0,s:2},  // M76+M78 → M91 MetLife NJ
  "rr32_2":{p:"rr16",i:1,s:1},"rr32_3":{p:"rr16",i:1,s:2},  // M79+M80 → M92 Mexico City
  "rr32_4":{p:"rr16",i:2,s:1},"rr32_5":{p:"rr16",i:2,s:2},  // M86+M88 → M95 Atlanta
  "rr32_6":{p:"rr16",i:3,s:1},"rr32_7":{p:"rr16",i:3,s:2},  // M85+M87 → M96 Vancouver
  "lr16_0":{p:"lqf",i:0,s:1},"lr16_1":{p:"lqf",i:0,s:2},
  "lr16_2":{p:"lqf",i:1,s:1},"lr16_3":{p:"lqf",i:1,s:2},
  "rr16_0":{p:"rqf",i:0,s:1},"rr16_1":{p:"rqf",i:0,s:2},
  "rr16_2":{p:"rqf",i:1,s:1},"rr16_3":{p:"rqf",i:1,s:2},
  "lqf_0":{p:"lsf",i:0,s:1},"lqf_1":{p:"lsf",i:0,s:2},
  "rqf_0":{p:"rsf",i:0,s:1},"rqf_1":{p:"rsf",i:0,s:2},
  "lsf_0":{p:"fin",i:0,s:1},
  "rsf_0":{p:"fin",i:0,s:2},
};

function getMatch(key){const[p,i]=key.split("_");return S[p][+i];}

// Clear only the WINNER field downstream — never touches t1/t2 team assignments.
// Each round's team slots are set independently by picks in that round.
function clearWinnersDown(key){
  const d=FEED[key]; if(!d) return;
  const m=S[d.p][d.i];
  m.winner=null; m.s1=""; m.s2="";
  clearWinnersDown(`${d.p}_${d.i}`);
}

// Propagate a winner forward: write into the NEXT match's team slot,
// then clear that next match's winner (and everything beyond).
function propagate(key,winner){
  const d=FEED[key]; if(!d) return;
  const m=S[d.p][d.i];
  if(d.s===1) m.t1=winner; else m.t2=winner;
  m.winner=null; m.s1=""; m.s2="";
  clearWinnersDown(`${d.p}_${d.i}`);
}

// When a winner is removed, pull that team out of the next match's slot
// and clear winners further down. Does NOT affect the source match's own t1/t2.
function unpropagateAndClear(key,team){
  const d=FEED[key]; if(!d) return;
  const m=S[d.p][d.i];
  // Only null the slot if it still holds this specific team
  if(d.s===1 && m.t1 && m.t1.n===team.n) m.t1=null;
  if(d.s===2 && m.t2 && m.t2.n===team.n) m.t2=null;
  m.winner=null; m.s1=""; m.s2="";
  clearWinnersDown(`${d.p}_${d.i}`);
}

function pickWinner(key,slot){
  const m=getMatch(key);
  const team=slot===1?m.t1:m.t2;
  if(!team) return;

  if(m.winner && m.winner.n===team.n){
    // Undo: clear this match's winner and remove the team from next round only
    m.winner=null; m.s1=""; m.s2="";
    unpropagateAndClear(key,team);
    // Also clear the loser from 3rd place if this was a semi
    updateThirdPlace();
  } else {
    // Switch: remove old winner from next round first, then set new one
    if(m.winner) unpropagateAndClear(key,m.winner);
    m.winner=team;
    propagate(key,team);
    // Populate 3rd place with semi losers
    updateThirdPlace();
  }

  S.open=null;
  render();
}

// Populate 3rd place match with losers of both semis
function updateThirdPlace(){
  const lsf=S.lsf[0]; const rsf=S.rsf[0];
  const tp=S.tpl[0];
  // Slot 1 = loser of lsf_0 (the team that did NOT win)
  if(lsf.winner && lsf.t1 && lsf.t2){
    tp.t1 = lsf.winner.n===lsf.t1.n ? lsf.t2 : lsf.t1;
  } else {
    tp.t1 = null;
  }
  // Slot 2 = loser of rsf_0
  if(rsf.winner && rsf.t1 && rsf.t2){
    tp.t2 = rsf.winner.n===rsf.t1.n ? rsf.t2 : rsf.t1;
  } else {
    tp.t2 = null;
  }
  // Clear 3rd place winner if teams changed
  tp.winner=null; tp.s1=""; tp.s2="";
}

function toggleOpen(key){S.open=S.open===key?null:key; render();}

function confirmScore(key){
  const s1=parseInt(document.getElementById("sc1_"+key).value)||0;
  const s2=parseInt(document.getElementById("sc2_"+key).value)||0;
  const m=getMatch(key); m.s1=s1; m.s2=s2;
  if(s1!==s2){
    const w=s1>s2?m.t1:m.t2;
    if(w){
      if(m.winner) unpropagateAndClear(key,m.winner);
      m.winner=w;
      propagate(key,w);
      updateThirdPlace();
    }
  }
  S.open=null; render();
}

function teamHTML(team,key,slot,win){
  if(!team) return`<div class="team tbd"><div class="flag-circle"><img src="https://flagcdn.com/40x30/un.png" alt="" onerror="this.style.display='none'"></div><span class="tname">TBD</span></div>`;
  return`<div class="team${win?" winner":""}" onclick="pickWinner('${key}',${slot})" title="${win?"Tap to undo":"Advance "+team.n}">
    <div class="flag-circle"><img src="${flagUrl(team.c)}" alt="${team.n}"></div><span class="tname">${team.n}</span><span class="check">✓</span>
  </div>`;
}

function matchHTML(key){
  const m=getMatch(key), open=S.open===key;
  const t1w=m.winner&&m.t1&&m.winner.n===m.t1.n;
  const t2w=m.winner&&m.t2&&m.winner.n===m.t2.n;
  const info=m.date?(key==="fin_0"
    ?`<div class="game-info"><div class="gi-top"><span class="gi-date">Sun Jul 19 · FIFA World Cup Final</span></div><div class="gi-top"><span class="gi-time">3:00 PM ET</span></div><div class="gi-venue">MetLife Stadium · East Rutherford, NJ</div></div>`
    :`<div class="game-info"><div class="gi-top"><span class="gi-date">${m.date}</span><span class="gi-time">· ${m.time}</span></div><div class="gi-venue">${m.venue}</div></div>`)
    :"";
  return`<div class="match${open?" open":""}" id="m_${key}">
    ${info}
    ${teamHTML(m.t1,key,1,t1w)}
    ${teamHTML(m.t2,key,2,t2w)}
    <button class="toggle" onclick="toggleOpen('${key}')">···</button>
    <div class="score-panel">

function colHTML(pool,r,label,n){
  const slots=Array(n).fill(0).map((_,i)=>`<div class="match-slot">${matchHTML(`${pool}_${i}`)}</div>`).join("");
  return`<div class="col" data-r="${r}"><div class="col-label">${label}</div><div class="col-body">${slots}</div></div>`;
}

function countDecided(){
  let n=0;
  ["lr32","rr32","lr16","rr16","lqf","rqf","lsf","rsf","tpl","fin"].forEach(p=>S[p].forEach(m=>{if(m.winner)n++;}));
  return n;
}

function render(){
  const tp=S.tpl[0];
  const tpCard=`<div style="width:100%;background:var(--surface);border:1px solid var(--border);border-left:2px solid var(--gold);border-radius:5px;overflow:hidden;">
    <div class="game-info">
      <div class="gi-top"><span class="gi-date">Sat Jul 18 · 3rd Place Match</span></div>
      <div class="gi-top"><span class="gi-time">5:00 PM ET</span></div>
      <div class="gi-venue">Hard Rock Stadium · Miami Gardens, FL</div>
    </div>
    ${teamHTML(tp.t1,"tpl_0",1,tp.winner&&tp.t1&&tp.winner.n===tp.t1.n)}
    ${teamHTML(tp.t2,"tpl_0",2,tp.winner&&tp.t2&&tp.winner.n===tp.t2.n)}
    <button class="toggle" onclick="toggleOpen('tpl_0')">···</button>
    ${S.open==="tpl_0"?`<div style="background:#0a0b14;border-top:1px solid var(--border);padding:5px 6px;display:flex;align-items:center;justify-content:center;gap:5px;">
      <div class="sc-wrap"><div class="sc-label">${tp.t1?tp.t1.n.substring(0,5):"T1"}</div><input class="sc-input" id="sc1_tpl_0" type="number" min="0" max="20" value="${tp.s1}" placeholder="0"></div>
      <span class="sc-vs">VS</span>
      <div class="sc-wrap"><div class="sc-label">${tp.t2?tp.t2.n.substring(0,5):"T2"}</div><input class="sc-input" id="sc2_tpl_0" type="number" min="0" max="20" value="${tp.s2}" placeholder="0"></div>
      <button class="sc-btn" onclick="confirmScore('tpl_0')">Set</button>
    </div>`:""}
  </div>`;

  document.getElementById("bracket").innerHTML=
    colHTML("lr32","r32","Round of 32",8)+
    colHTML("lr16","r16","Round of 16",4)+
    colHTML("lqf","qf","Quarters",2)+
    colHTML("lsf","sf","Semi",1)+
    `<div class="col" data-r="f">
      <div class="col-label">Final</div>
      <div class="col-body" style="justify-content:center;gap:8px;padding:4px 0;">
        ${matchHTML("fin_0")}
        ${champHTML()}
        ${tpCard}
      </div>
    </div>`+
    colHTML("rsf","sf","Semi",1)+
    colHTML("rqf","qf","Quarters",2)+
    colHTML("rr16","r16","Round of 16",4)+
    colHTML("rr32","r32","Round of 32",8);
  document.getElementById("prog").textContent=`${countDecided()} / 32`;
  document.getElementById("below-bracket").innerHTML="";
}


// ── AUTOSAVE TO LOCALSTORAGE ──────────────────────────────────────────────────
const LS_KEY = "wc2026_bracket";

function stateToCode(){
  const pools=["lr32","rr32","lr16","rr16","lqf","rqf","lsf","rsf","tpl","fin"];
  const data=pools.map(p=>S[p].map(m=>({
    w:m.winner?m.winner.c||m.winner.n:null,
    s1:m.s1||0, s2:m.s2||0
  })));
  return btoa(encodeURIComponent(JSON.stringify(data)));
}

function codeToState(code){
  try{
    const data=JSON.parse(decodeURIComponent(atob(code)));
    const pools=["lr32","rr32","lr16","rr16","lqf","rqf","lsf","rsf","tpl","fin"];
    const allTeams={};
    [...L32,...R32].forEach(m=>{
      allTeams[m.t1.c]=m.t1; allTeams[m.t1.n]=m.t1;
      allTeams[m.t2.c]=m.t2; allTeams[m.t2.n]=m.t2;
    });
    data.forEach((pool,pi)=>{
      pool.forEach((entry,mi)=>{
        const m=S[pools[pi]][mi];
        m.s1=entry.s1||""; m.s2=entry.s2||"";
        if(entry.w){
          const team=allTeams[entry.w]||{n:entry.w,c:entry.w};
          m.winner=team;
          propagate(pools[pi]+"_"+mi, team);
        }
      });
    });
  }catch(e){ console.warn("Could not restore bracket",e); }
}

function autoSave(){
  try{ localStorage.setItem(LS_KEY, stateToCode()); }catch(e){}
}

function autoLoad(){
  // URL param takes priority (coming from a shared link)
  try{
    const params=new URLSearchParams(window.location.search);
    const urlCode=params.get("b");
    if(urlCode){ codeToState(urlCode); return; }
  }catch(e){}
  // Otherwise restore from localStorage (same device refresh)
  try{
    const saved=localStorage.getItem(LS_KEY);
    if(saved) codeToState(saved);
  }catch(e){}
}

// Wrap pick/score actions to autosave after every change
const _origPick=pickWinner;
pickWinner=function(key,slot){ _origPick(key,slot); autoSave(); };
const _origScore=confirmScore;
confirmScore=function(key){ _origScore(key); autoSave(); };

function saveBracket(){
  autoSave();
  const code=stateToCode();
  const url=window.location.origin+window.location.pathname+"?b="+code;
  document.getElementById("link-input").value=url;
  document.getElementById("link-box").classList.add("show");
  setTimeout(()=>{ document.getElementById("link-input").select(); },100);
}

function copyLink(){
  const input=document.getElementById("link-input");
  input.select();
  input.setSelectionRange(0,99999);
  try{
    navigator.clipboard.writeText(input.value).catch(()=>{});
    document.execCommand("copy");
  }catch(e){ document.execCommand("copy"); }
  const btn=document.querySelector(".link-copy-btn");
  btn.textContent="Copied ✓";
  setTimeout(()=>btn.textContent="Copy",2000);
}

function closeLinkBox(){
  document.getElementById("link-box").classList.remove("show");
}

autoLoad();
render();
</script>
